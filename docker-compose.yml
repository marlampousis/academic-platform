services:

  db:
    image: postgres:16
    container_name: academic_platform_db

    restart: always

    environment:
      POSTGRES_USER: academic_user
      POSTGRES_PASSWORD: academic_password
      POSTGRES_DB: academic_platform

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: academic_platform_pgadmin

    restart: always

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@academic-platform.com
      PGADMIN_DEFAULT_PASSWORD: admin123

    ports:
      - "5050:80"

    depends_on:
      - db

    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data: